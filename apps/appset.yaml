---
# ApplicationSet — with canary environment added.
# Used in the second step of Scene 5 to show live environment addition via Git.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-app-environments
  namespace: openshift-gitops
  labels:
    demo: gitops
    layer: applicationset
spec:
  generators:
  - list:
      elements:
      - env: dev
        namespace: gitops-dev
        autoSync: "true"
        prune: "true"
      - env: staging
        namespace: gitops-staging
        autoSync: "true"
        prune: "false"
      - env: prod
        namespace: gitops-prod
        autoSync: "false"
        prune: "false"
      - env: canary
        namespace: gitops-canary
        autoSync: "true"
        prune: "false"
  template:
    metadata:
      name: "demo-app-{{env}}"
      namespace: openshift-gitops
      labels:
        demo: gitops
        environment: "{{env}}"
      finalizers:
      - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: REPO_URL
        targetRevision: main
        path: "overlays/{{env}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        - PrunePropagationPolicy=foreground
